name: CI/CD Pipeline

on:
  push:
    branches: [ master, main ]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [ master, main ]

jobs:
  http-backend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: http-backend/package-lock.json
      - name: Install Dependencies
        working-directory: ./http-backend
        run: npm install
      - name: Build HTTP Backend
        working-directory: ./http-backend
        run: |
          npx prisma generate
          npm run build

  ws-backend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ws-backend/package-lock.json
      - name: Install Dependencies
        working-directory: ./ws-backend
        run: npm install
      - name: Build WS Backend
        working-directory: ./ws-backend
        run: |
          npx prisma generate
          npm run build

  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install Dependencies
        working-directory: ./frontend
        run: npm install
      - name: Build Frontend
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_BACKEND_URL: https://sketchspace.duckdns.org/api
          NEXT_PUBLIC_WS_URL: wss://sketchspace.duckdns.org/ws
        run: npm run build

  build-and-push:
    runs-on: ubuntu-latest
    needs: [http-backend-ci, ws-backend-ci, frontend-ci]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase REPO
        run: |
          echo "REPO_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >>${GITHUB_ENV}
          echo "REPO_PATH=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}

      - name: Build and push HTTP Backend
        uses: docker/build-push-action@v5
        with:
          context: ./http-backend
          push: true
          tags: ghcr.io/${{ env.REPO_PATH }}/http-backend:latest

      - name: Build and push WS Backend
        uses: docker/build-push-action@v5
        with:
          context: ./ws-backend
          push: true
          tags: ghcr.io/${{ env.REPO_PATH }}/ws-backend:latest

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ env.REPO_PATH }}/frontend:latest
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=https://sketchspace.duckdns.org/api
            NEXT_PUBLIC_WS_URL=wss://sketchspace.duckdns.org/ws

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose.prod.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "~/sketch-space"

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/sketch-space
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Export secrets for docker-compose
            export REPO_OWNER=${{ github.repository_owner }}
            export DB_USER=${{ secrets.DB_USER }}
            export DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            export JWT_SECRET=${{ secrets.JWT_SECRET }}
            export FRONTEND_URL=https://sketchspace.duckdns.org
            
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
