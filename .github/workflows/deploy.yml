name: CI/CD Pipeline

on:
  push:
    branches: [master, main]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [master, main]

jobs:
  # ─────────────────────────── CI Jobs ──────────────────────────────
  http-backend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: http-backend/package-lock.json
      - name: Install & Build HTTP Backend
        working-directory: ./http-backend
        run: |
          npm install
          npx prisma generate
          npm run build

  ws-backend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ws-backend/package-lock.json
      - name: Install & Build WS Backend
        working-directory: ./ws-backend
        run: |
          npm install
          npx prisma generate
          npm run build

  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install & Build Frontend
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_BACKEND_URL: ${{ secrets.NEXT_PUBLIC_BACKEND_URL }}
          NEXT_PUBLIC_WEBSOCKET_URL: ${{ secrets.NEXT_PUBLIC_WEBSOCKET_URL }}
        run: npm install && npm run build

  # ─────────────────────── Deploy to Render & Vercel ─────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [http-backend-ci, ws-backend-ci, frontend-ci]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')

    steps:
      - name: Trigger Render deploy — HTTP Backend
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_HTTP_DEPLOY_HOOK }}" | grep -q "^2" \
            && echo "✅ HTTP backend deploy triggered" \
            || (echo "❌ HTTP backend deploy failed" && exit 1)

      - name: Trigger Render deploy — WS Backend
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_WS_DEPLOY_HOOK }}" | grep -q "^2" \
            && echo "✅ WS backend deploy triggered" \
            || (echo "❌ WS backend deploy failed" && exit 1)

      # Vercel auto-deploys via its GitHub integration on every push.
      # No explicit step needed — ensure the Vercel project is connected
      # to this repo with NEXT_PUBLIC_BACKEND_URL and NEXT_PUBLIC_WEBSOCKET_URL
      # set in the Vercel dashboard (Production environment).
      - name: Note — Frontend (Vercel)
        run: echo "✅ Vercel will auto-deploy the frontend via its GitHub integration."
